<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>የኢትዮጵያ ፒያኖ | Ethiopian Kids Piano</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:white;overflow-x:hidden;}
    .header{text-align:center;padding:16px 12px 8px;}
    .header-logo{font-size:36px;margin-bottom:4px;}
    .header-title{font-size:22px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .header-sub{color:#93c5fd;font-size:11px;margin-top:2px;}
    .tabs{display:flex;gap:8px;padding:8px 12px;justify-content:center;}
    .tab{flex:1;max-width:160px;padding:10px;border-radius:12px;border:none;background:rgba(255,255,255,0.08);color:white;font-weight:700;font-size:14px;cursor:pointer;}
    .tab.active{background:linear-gradient(135deg,#667eea,#764ba2);}
    .card{background:rgba(255,255,255,0.06);border-radius:18px;padding:14px;margin:8px 12px;border:1px solid rgba(255,255,255,0.1);}
    .sound-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
    .sound-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:6px 14px;color:white;cursor:pointer;font-size:13px;}
    .sound-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);font-weight:700;}
    .keys-wrap{overflow-x:auto;padding:4px 0;}
    .keys{display:flex;gap:4px;min-width:max-content;padding:4px 12px;}
    .key{width:72px;height:130px;border-radius:0 0 14px 14px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:10px;transition:transform .1s;}
    .key.active{transform:scaleY(0.93);transform-origin:top;}
    .key-note{font-weight:800;font-size:14px;color:white;}
    .input-row{display:flex;gap:8px;}
    .song-input{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px;color:white;}
    .song-btn{background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:10px;padding:10px 14px;color:white;font-weight:700;cursor:pointer;}
    .now-playing{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
    .play-btn{background:linear-gradient(135deg,#11998e,#38ef7d);border:none;border-radius:8px;padding:7px 14px;color:white;cursor:pointer;}
    .hidden{display:none !important;}
    .suggs{display:flex;flex-wrap:wrap;gap:7px;padding:10px;}
    .sugg{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:20px;padding:6px 12px;color:white;cursor:pointer;font-size:12px;}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🎹🇪🇹</div>
  <div class="header-title">የኢትዮጵያ ፒያኖ</div>
  <div class="header-sub">የትዝታ ቅኝት • Tizita Scale</div>
</div>

<div class="card">
  <div class="sound-btns">
    <button class="sound-btn active" onclick="setSound(0,this)">🎵 ትዝታ</button>
    <button class="sound-btn" onclick="setSound(1,this)">🪕 ክራር</button>
    <button class="sound-btn" onclick="setSound(2,this)">🪈 ፉሪ</button>
  </div>
</div>

<div class="card">
  <div class="keys-wrap">
    <div class="keys" id="keys"></div>
  </div>
</div>

<div class="card">
  <div class="input-row">
    <input class="song-input" id="songInput" placeholder="ዘፈን ስም ይጻፉ..."/>
    <button class="song-btn" id="parseBtn" onclick="parseSong()">🎵 ፈልግ</button>
  </div>
  <div id="nowPlaying" class="now-playing hidden">
    <span id="nowName"></span>
    <button class="play-btn" id="playBtn">▶ Play</button>
  </div>
</div>

<div class="suggs">
  <button class="sugg" onclick="parseSong('ጨረቃዬ')">🌙 ጨረቃዬ</button>
  <button class="sugg" onclick="parseSong('አበባዬ')">🌸 አበባዬ</button>
  <button class="sugg" onclick="parseSong('እናቴ')">💝 እናቴ</button>
</div>

<script>
const NOTES = ['ዶ','ሬ','ሚ','ላ','ሲ','ዶ2','ሬ2','ሚ2'];
const COLORS = ['#FF6B6B','#FF8E53','#FFD93D','#6BCB77','#4D96FF','#845EC2','#FF6F91','#FF4500'];
const FREQS = {ዶ:293.66,ሬ:329.63,ሚ:369.99,ላ:440,ሲ:493.88,'ዶ2':587.33,'ሬ2':659.25,'ሚ2':739.99};

let ctx = null, soundIdx = 0, currentSong = null, songTouts = [];

function initAudio(){
  if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();
}

function playTone(freq, dur=0.6){
  initAudio();
  const osc=ctx.createOscillator(), gain=ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = soundIdx === 0 ? 'triangle' : soundIdx === 1 ? 'sawtooth' : 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
  osc.start(); osc.stop(ctx.currentTime + dur);
}

function pressKey(note){
  const freq = FREQS[note];
  if(freq) {
    playTone(freq);
    const el = document.querySelector(`[data-note="${note}"]`);
    if(el) {
      el.classList.add('active');
      setTimeout(()=>el.classList.remove('active'), 200);
    }
  }
}

function buildKeys(){
  const container = document.getElementById('keys');
  NOTES.forEach((note, i) => {
    const k = document.createElement('button');
    k.className = 'key'; k.dataset.note = note;
    k.style.background = COLORS[i];
    k.innerHTML = `<span class="key-note">${note}</span>`;
    k.onclick = () => pressKey(note);
    container.appendChild(k);
  });
}

function setSound(i, btn){
  soundIdx = i;
  document.querySelectorAll('.sound-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

async function parseSong(name){
  name = name || document.getElementById('songInput').value.trim();
  if(!name) return;
  const btn = document.getElementById('parseBtn');
  btn.textContent = '⏳'; btn.disabled = true;
  
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'x-api-key': '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'
      },
      body: JSON.stringify({
        model: 'claude-3-haiku-20240307',
        max_tokens: 1000,
        messages: [{
          role: 'user', 
          content: `Create a simple melody for "${name}" using only these notes: ዶ,ሬ,ሚ,ላ,ሲ,ዶ2. Respond ONLY with a JSON object like this: {"title":"Name","notes":[{"note":"ዶ","time":0,"duration":0.5}]}`
        }]
      })
    });

    const data = await res.json();
    if(data.error) throw new Error(data.error.message);

    const song = JSON.parse(data.content[0].text.trim());
    currentSong = song;
    document.getElementById('nowName').textContent = '🎵 ' + song.title;
    document.getElementById('nowPlaying').classList.remove('hidden');
    document.getElementById('playBtn').onclick = () => playSongData(song);
    playSongData(song);
  } catch(e) {
    alert('ስህተት፦ ' + e.message);
  } finally {
    btn.textContent = '🎵 ፈልግ'; btn.disabled = false;
  }
}

function playSongData(song){
  songTouts.forEach(clearTimeout);
  song.notes.forEach(n => {
    songTouts.push(setTimeout(() => {
      pressKey(n.note);
    }, n.time * 1000));
  });
}

buildKeys();
</script>
</body>
</html>
